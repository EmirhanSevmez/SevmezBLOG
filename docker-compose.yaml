version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: blog_db
    environment:
      POSTGRES_USER: admin #change later
      POSTGRES_PASSWORD: secretpassword #change later
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data 

 
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app 
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=admin #change later
      - DB_PASSWORD=secretpassword #change later
      - DB_NAME=blogdb
      - DB_PORT=5432

  
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080

volumes:
  pgdata: